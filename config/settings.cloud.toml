# Cloud SITL Configuration
# For use with AWS EC2 SITL instance

[vehicle]
backend = "ardupilot_sitl"
connection_string = "tcp:3.95.154.113:5760"  # Update with your EC2 IP
force_arm = true  # Required for cloud SITL without physical sensors
vehicle_type = "copter"

[vehicle.timeouts]
connection = 30.0
arming = 60.0
takeoff = 120.0
mission = 300.0
mode_change = 10.0

[simulation]
mode = "cloud"
sitl_version = "4.8"
vehicle_type = "copter"

[simulation.gazebo]
enabled = false  # Set to true when Gazebo is set up
world = "basic_field"
model = "iris"
physics_rtf = 1.0
gz_version = "modern"

[logging]
level = "INFO"
format = "structured"

[mqtt]
enabled = false
host = "localhost"
port = 1883
