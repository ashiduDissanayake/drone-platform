---
- name: Simulator Role - ArduPilot SITL Setup
  block:
    - name: Ensure required packages are installed
      apt:
        name:
          - git
          - python3
          - python3-pip
          - python3-dev
          - python3-opencv
          - python3-matplotlib
          - python3-lxml
          - python3-scipy
          - g++
          - make
          - gcc
          - gawk
          - wget
          - curl
          - netcat
        state: present
        update_cache: yes
      become: yes

    - name: Install Python packages for SITL
      pip:
        name:
          - future
          - lxml
          - pymavlink
          - pyserial
          - pexpect
        executable: pip3
      become: yes

    - name: Check if ArduPilot is already cloned
      stat:
        path: "{{ ansible_env.HOME }}/ardupilot"
      register: ardupilot_dir

    - name: Clone ArduPilot repository
      git:
        repo: https://github.com/ArduPilot/ardupilot.git
        dest: "{{ ansible_env.HOME }}/ardupilot"
        depth: 1
        recursive: yes
        version: Copter-4.4
      when: not ardupilot_dir.stat.exists
      register: git_clone

    - name: Install ArduPilot Python dependencies
      pip:
        requirements: "{{ ansible_env.HOME }}/ardupilot/Tools/environment_install/requirements.txt"
        executable: pip3
      ignore_errors: yes

    - name: Configure waf build
      command: ./waf configure --board sitl
      args:
        chdir: "{{ ansible_env.HOME }}/ardupilot"
      register: waf_configure
      changed_when: "'Setting board to' in waf_configure.stdout"

    - name: Build ArduCopter SITL
      command: ./waf copter
      args:
        chdir: "{{ ansible_env.HOME }}/ardupilot"
      register: waf_build
      changed_when: "waf_build.rc == 0"

    - name: Create SITL start script
      copy:
        dest: "{{ ansible_env.HOME }}/start-sitl.sh"
        content: |
          #!/bin/bash
          # Start ArduPilot SITL with public TCP access
          
          cd ~/ardupilot/ArduCopter
          
          # Kill any existing SITL
          pkill -f arducopter 2>/dev/null || true
          sleep 2
          
          echo "Starting SITL on tcp:0.0.0.0:5760..."
          ../build/sitl/bin/arducopter \
              -w \
              --model + \
              --home -35.363261,149.165230,584,353 \
              --defaults ../Tools/autotest/default_params/copter.parm \
              --serial0 tcp:0.0.0.0:5760
        mode: '0755'

    - name: Create systemd service for SITL
      copy:
        dest: /etc/systemd/system/ardupilot-sitl.service
        content: |
          [Unit]
          Description=ArduPilot SITL Simulator
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/ardupilot/ArduCopter
          ExecStart=/home/ubuntu/ardupilot/build/sitl/bin/arducopter -w --model + --home -35.363261,149.165230,584,353 --defaults ../Tools/autotest/default_params/copter.parm --serial0 tcp:0.0.0.0:5760
          Restart=always
          RestartSec=10
          
          [Install]
          WantedBy=multi-user.target
      become: yes

    - name: Reload systemd
      systemd:
        daemon_reload: yes
      become: yes

    - name: Enable SITL service
      systemd:
        name: ardupilot-sitl
        enabled: yes
      become: yes

    - name: Start SITL service
      systemd:
        name: ardupilot-sitl
        state: started
      become: yes

  rescue:
    - name: Simulator setup failed
      debug:
        msg: "Simulator role failed. Check logs above."
