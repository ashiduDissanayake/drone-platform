services:
  mission_manager:
    image: ghcr.io/example/mission-manager:dev
    profiles: ["autonomy"]
    environment:
      - DEPLOYMENT_NAME=${DEPLOYMENT_NAME:-unset}

  vehicle_adapter:
    image: ghcr.io/example/vehicle-adapter:dev
    profiles: ["adapters"]

  world_adapter:
    image: ghcr.io/example/world-adapter:dev
    profiles: ["adapters"]

  telemetry_adapter:
    image: ghcr.io/example/telemetry-adapter:dev
    profiles: ["adapters"]

networks:
  platform_net:
    driver: bridge
