apiVersion: drone-platform/v1
kind: Inventory
metadata:
  name: example_lab_inventory
spec:
  devices:
    - id: devbox-01
      role: control_host
      connection:
        host: 192.168.1.10
        user: drone
      capabilities:
        container_runtime: docker
        gpu: false
    - id: companion-01
      role: companion_host
      connection:
        host: 192.168.1.20
        user: drone
      capabilities:
        container_runtime: docker
        gpu: false
    - id: sim-01
      role: sim_host
      connection:
        host: 192.168.1.30
        user: drone
      capabilities:
        container_runtime: docker
        gpu: true
    - id: gcs-01
      role: gcs_host
      connection:
        host: 192.168.1.40
        user: operator
      capabilities:
        container_runtime: docker
        gpu: false
