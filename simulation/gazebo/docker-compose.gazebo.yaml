# Gazebo + ArduPilot SITL Integration
# Provides 3D visualization for drone-platform missions

services:
  # Gazebo Simulator with ardupilot_gazebo plugin
  gazebo:
    build:
      context: .
      dockerfile: Dockerfile.gazebo
    container_name: drone-platform-gazebo
    privileged: true
    environment:
      - GZ_SIM_RESOURCE_PATH=/usr/share/gz/gz-sim8:/usr/local/share/ardupilot_gazebo
      - GZ_SIM_MODEL_PATH=/usr/local/share/ardupilot_gazebo/models
      - GZ_VERSION=harmonic
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - gazebo-models:/root/.gz/models:rw
      - gazebo-worlds:/root/.gz/worlds:rw
    ports:
      - "9002:9002"
      - "11345:11345"
    networks:
      - gazebo-network
    command: >
      bash -c "
        echo 'Downloading Iris model...' &&
        mkdir -p /root/.gz/models &&
        cd /root/.gz/models &&
        (git clone --depth 1 https://github.com/ArduPilot/ardupilot_gazebo.git temp 2>/dev/null && 
         cp -r temp/models/* . 2>/dev/null || 
         echo 'Models may already exist') &&
        rm -rf temp &&
        echo 'Starting Gazebo...' &&
        gz sim -v 4 -r /usr/local/share/ardupilot_gazebo/worlds/iris_runway.sdf ||
        gz sim -v 4 -r empty.sdf
      "

  # ArduPilot SITL connected to Gazebo
  sitl-gazebo:
    build:
      context: .
      dockerfile: Dockerfile.sitl-gazebo
    container_name: drone-platform-sitl-gazebo
    environment:
      - GAZEBO_IP=gazebo
      - GAZEBO_PORT=9002
      - MAVLINK_TCP_PORT=5760
      - VEHICLE_TYPE=copter
      - VEHICLE_MODEL=iris
    ports:
      - "5760:5760"
      - "5761:5761"
      - "5762:5762"
      - "5763:5763"
      - "14550:14550/udp"
    networks:
      - gazebo-network
    depends_on:
      - gazebo
    command: >
      bash -c "
        echo 'Waiting for Gazebo...' &&
        sleep 15 &&
        /run-sitl.sh
      "

volumes:
  gazebo-models:
    driver: local
  gazebo-worlds:
    driver: local

networks:
  gazebo-network:
    driver: bridge
