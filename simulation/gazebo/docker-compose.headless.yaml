# Gazebo + ArduPilot SITL - HEADLESS MODE
services:
  gazebo:
    build:
      context: .
      dockerfile: Dockerfile.gazebo
    container_name: drone-platform-gazebo
    environment:
      - GZ_SIM_SYSTEM_PLUGIN_PATH=/usr/local/lib/gz-sim-8/plugins:/usr/lib/aarch64-linux-gnu/gz-sim-8/plugins
      - GZ_SIM_RESOURCE_PATH=/usr/local/share/ardupilot_gazebo/worlds:/usr/share/gz/gz-sim8/worlds
      - GZ_SIM_MODEL_PATH=/usr/local/share/ardupilot_gazebo/models:/root/.gz/models
      - LD_LIBRARY_PATH=/usr/local/lib/gz-sim-8/plugins
      - HOME=/root
    volumes:
      - gazebo-models:/root/.gz/models:rw
    ports:
      - "9002:9002"
    networks:
      - gazebo-network
    command: >
      bash -c "
        echo 'Setting up Gazebo models...' &&
        mkdir -p /root/.gz/models &&
        cd /root/.gz/models &&
        if [ ! -d 'iris_with_gimbal' ]; then
          echo 'Downloading models from ArduPilot...' &&
          git clone --depth 1 https://github.com/ArduPilot/ardupilot_gazebo.git temp_clone &&
          cp -r temp_clone/models/* . &&
          rm -rf temp_clone &&
          echo 'Models downloaded';
        fi &&
        ls -la &&
        echo 'Starting Gazebo Server...' &&
        gz sim -v 4 -r /usr/local/share/ardupilot_gazebo/worlds/iris_runway.sdf -s
      "

  sitl-gazebo:
    build:
      context: .
      dockerfile: Dockerfile.sitl-gazebo
    container_name: drone-platform-sitl-gazebo
    environment:
      - GAZEBO_IP=gazebo
      - GAZEBO_PORT=9002
      - MAVLINK_TCP_PORT=5760
    ports:
      - "5760:5760"
      - "5762:5762"
      - "5763:5763"
      - "14550:14550/udp"
    networks:
      - gazebo-network
    depends_on:
      - gazebo
    command: >
      bash -c "
        echo 'Waiting for Gazebo...' &&
        sleep 15 &&
        /run-sitl.sh
      "

volumes:
  gazebo-models:
    driver: local

networks:
  gazebo-network:
    driver: bridge
