# Gazebo + ArduPilot SITL - HEADLESS MODE (no GUI, works on all systems)
services:
  gazebo:
    build:
      context: .
      dockerfile: Dockerfile.gazebo
    container_name: drone-platform-gazebo
    environment:
      - GZ_SIM_SYSTEM_PLUGIN_PATH=/usr/local/lib/gz-sim-8/plugins:/usr/lib/aarch64-linux-gnu/gz-sim-8/plugins
      - GZ_SIM_RESOURCE_PATH=/usr/local/share/ardupilot_gazebo/worlds:/usr/share/gz/gz-sim8/worlds
      - GZ_SIM_MODEL_PATH=/usr/local/share/ardupilot_gazebo/models
      - LD_LIBRARY_PATH=/usr/local/lib/gz-sim-8/plugins
    volumes:
      - gazebo-models:/root/.gz/models:rw
    ports:
      - "9002:9002"
    networks:
      - gazebo-network
    # Run in headless mode (server only) - most reliable
    command: >
      bash -c "
        echo 'Starting Gazebo Server (headless)...' &&
        gz sim -v 4 -r /usr/local/share/ardupilot_gazebo/worlds/iris_runway.sdf -s
      "

  sitl-gazebo:
    build:
      context: .
      dockerfile: Dockerfile.sitl-gazebo
    container_name: drone-platform-sitl-gazebo
    environment:
      - GAZEBO_IP=gazebo
      - GAZEBO_PORT=9002
      - MAVLINK_TCP_PORT=5760
    ports:
      - "5760:5760"
      - "5762:5762"
      - "5763:5763"
      - "14550:14550/udp"
    networks:
      - gazebo-network
    depends_on:
      - gazebo
    command: >
      bash -c "
        echo 'Waiting for Gazebo...' &&
        sleep 10 &&
        /run-sitl.sh
      "

volumes:
  gazebo-models:
    driver: local

networks:
  gazebo-network:
    driver: bridge
