# Simple Gazebo + SITL without complex waiting
services:
  gazebo:
    build:
      context: .
      dockerfile: Dockerfile.gazebo
    container_name: drone-platform-gazebo
    environment:
      - GZ_SIM_SYSTEM_PLUGIN_PATH=/usr/local/lib/ardupilot_gazebo:/usr/local/lib/gz-sim-8/plugins:/usr/lib/aarch64-linux-gnu/gz-sim-7/plugins
      - GZ_SIM_RESOURCE_PATH=/usr/local/share/ardupilot_gazebo/worlds:/usr/share/gz/gz-sim8/worlds
      - GZ_SIM_MODEL_PATH=/usr/local/share/ardupilot_gazebo/models:/root/.gz/models
      - LD_LIBRARY_PATH=/usr/local/lib/ardupilot_gazebo:/usr/local/lib
      - HOME=/root
    volumes:
      - gazebo-models:/root/.gz/models:rw
    ports:
      - "9002:9002"
    networks:
      - gazebo-network
    command: >
      bash -c "
        echo 'Setting up models...' &&
        mkdir -p /root/.gz/models &&
        cd /root/.gz/models &&
        if [ ! -d 'iris_with_standoffs' ]; then
          git clone --depth 1 https://github.com/ArduPilot/ardupilot_gazebo.git temp &&
          cp -r temp/models/* . &&
          rm -rf temp;
        fi &&
        echo 'Starting Gazebo...' &&
        exec gz sim -v 4 -r /usr/local/share/ardupilot_gazebo/worlds/iris_runway.sdf -s
      "

  sitl:
    build:
      context: .
      dockerfile: Dockerfile.sitl-gazebo
    container_name: drone-platform-sitl
    environment:
      - MAVLINK_TCP_PORT=5760
    ports:
      - "5760:5760"
      - "5762:5762"
      - "5763:5763"
      - "14550:14550/udp"
    networks:
      - gazebo-network
    command: >
      bash -c "
        echo 'Waiting 10s for Gazebo to initialize...' &&
        sleep 10 &&
        echo 'Starting SITL...' &&
        cd /ardupilot/ArduCopter &&
        exec ../build/sitl/bin/arducopter \\
          -w \\
          --model gazebo-iris \\
          --home -35.363261,149.165230,584,353 \\
          --defaults ../Tools/autotest/default_params/copter.parm \\
          --serial0 tcp:0.0.0.0:5760
      "

volumes:
  gazebo-models:
    driver: local

networks:
  gazebo-network:
    driver: bridge
